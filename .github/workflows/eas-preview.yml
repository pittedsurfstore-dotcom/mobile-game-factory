name: EAS Preview Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: eas-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Preview build (iOS Simulator + Android APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Gate on EXPO_TOKEN secret
        id: gate
        env:
          TOKEN_PRESENT: ${{ secrets.EXPO_TOKEN != '' }}
        run: |
          if [ "$TOKEN_PRESENT" = "true" ]; then
            echo "skip=0" >> "$GITHUB_OUTPUT"
          else
            echo "EXPO_TOKEN secret not set on this repo; skipping EAS build." >> "$GITHUB_STEP_SUMMARY"
            echo "See CONTRIBUTING.md → EAS preview builds for setup." >> "$GITHUB_STEP_SUMMARY"
            echo "skip=1" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v5
        if: steps.gate.outputs.skip == '0'
        with:
          version: 9.12.0

      - uses: actions/setup-node@v5
        if: steps.gate.outputs.skip == '0'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.gate.outputs.skip == '0'
        run: pnpm install --frozen-lockfile

      - name: Queue EAS build
        if: steps.gate.outputs.skip == '0'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        working-directory: apps/mobile
        run: npx eas-cli@latest build --platform all --profile preview --non-interactive --no-wait
